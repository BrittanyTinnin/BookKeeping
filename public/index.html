<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
        integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w=="
        crossorigin="anonymous" />
    <!-- Bootstrap CSS Link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <!-- Google Font: Gentium Book Basic -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Book+Basic&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Book List</title>
</head>

<body>
    <div class="container mt-4">
        <h1 class="text-center display-4">
            <i class="fas fa-book-reader text-info"></i>
            Book<span class="text-info">Keeping</span>
        </h1>
        <form id="add-book-form" class="my-4">
            <div class="mb-3">
                <label for="title" class="form-label">Title</label>
                <input type="text" name="title" id="title" class="form-control">
            </div>
            <div class="mb-3">
                <label for="author" class="form-label">Author</label>
                <input type="text" name="author" id="author" class="form-control">
            </div>
            <div class="mb-3">
                <label for="isbn" class="form-label">ISBN#</label>
                <input type="number" name="isbn" id="isbn" class="form-control">
            </div>
            <div class="d-grid">
                <input type="submit" class="btn btn-info text-white" value="Add Book">
            </div>
        </form>
        <table class="table table-hover mt-2">
            <thead>
                <tr>
                    <th scope="col">Title</th>
                    <th scope="col">Author</th>
                    <th scope="col">ISBN#</th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody id="book-list">
                <!--add row with data here-->
            </tbody>
        </table>
    </div>


    <!-- Bootstrap Bundle Link -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0"
        crossorigin="anonymous"></script>
    <script>
        // Book Class: Represents a Book
        class Book {
            constructor(title, author, isbn) {
                this.title = title;
                this.author = author;
                this.isbn = isbn;
            }
        }

        const storedBooks = [
            { title: 'Promise Land', author: 'Obama', isbn: '1234' },
            { title: 'Untamed', author: 'Glennon Doyle', isbn: '4567' },
            { title: 'One More Chance', author: 'Ali Vali', isbn: '8901' },
        ];

        // UI Class Handle UI Tasks
        // Vanish alert in 3 seconds
        class UI {
            //add stored books to the list
            static displayBooks() {
                const books = Store.getBooks();
                books.forEach((book) => UI.addBookToList(book));
            }

            static addBookToList(book) {
                const list = document.querySelector('#book-list');
                const row = document.createElement('tr');
                row.innerHTML = `
    <td>${book.title}</td>
    <td>${book.author}</td>
    <td>${book.isbn}</td>
    <td><a href="#" class="btn btn-danger btn-sm delete">X</a></td>
    `;

                list.appendChild(row);
            }

            static showAlert(message, className) {
                const div = document.createElement('div');
                div.className = `alert alert-${className}`;
                div.appendChild(document.createTextNode(message));
                const container = document.querySelector('.container');
                const form = document.querySelector('#add-book-form');
                container.insertBefore(div, form);

                setTimeout(() => document.querySelector('.alert').remove(), 3000);
            }

            static clearFields() {
                document.querySelector('#title').value = '';
                document.querySelector('#author').value = '';
                document.querySelector('#isbn').value = '';
            }

            static deleteBook(element) {
                if (element.classList.contains('delete')) {
                    element.parentElement.parentElement.remove();
                }
            }
        }

        // Store Class: Handles Storage
        class Store {
            // get books from local storage
            static getBooks() {
                let books;
                if (localStorage.getItem('books') === null) {
                    books = [];
                } else {
                    books = JSON.parse(localStorage.getItem('books'));
                }
                return books;
            }

            // store a book to local storage
            static addBook(book) {
                const books = Store.getBooks();
                books.push(book);
                localStorage.setItem('books', JSON.stringify(books));
            }

            // remove a book from local storage
            static removeBook(isbn) {
                const books = Store.getBooks();

                books.forEach((book, index) => {
                    if (book.isbn === isbn) {
                        books.splice(index, 1);
                    }
                });
                localStorage.setItem('books', JSON.stringify(books));
            }
        }

        // Event: Display Books
        document.addEventListener('DOMContentLoaded', UI.displayBooks);

        // Event: Add a book
        document.querySelector('#add-book-form').addEventListener('submit', (event) => {
            event.preventDefault();

            console.log('submit form');
            // Get form values
            const title = document.querySelector('#title').value;
            const author = document.querySelector('#author').value;
            const isbn = document.querySelector('#isbn').value;

            // Validate form values
            if ((title === '') | (author === '') | (isbn === '')) {
                // show alert if values empty -- from UI class
                UI.showAlert('Please fill in all fields.', 'danger');
            } else if (isbn.length > 10) {
                UI.showAlert('ISBN cannot be more than 10 numbers', 'danger');
            } else {
                // Instantiate a book
                const book = new Book(title, author, isbn);

                // Add Book to UI -- from UI class
                UI.addBookToList(book);

                // Add book to store -- from Store class
                Store.addBook(book);

                // Show success message -- from UI class
                UI.showAlert('Book added successfully', 'success');

                // Clear fields -- from UI class
                UI.clearFields();
            }
        });

        // Event: Remove a Book
        document.querySelector('#book-list').addEventListener('click', (e) => {
            // Remove book from UI -- from UI class
            UI.deleteBook(e.target);

            // Remove book from store -- from Store class
            Store.removeBook(e.target.parentElement.previousElementSibling.textContent);

            // Show success message -- from UI class
            UI.showAlert('Book removed successfully.', 'success');
        });

    </script>
</body>

</html>
